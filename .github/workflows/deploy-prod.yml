name: Deploy Landing to Production (CDN)

on:
  push:
    branches: [main]

env:
  PROJECT_ID: personal-480817
  BUCKET: gs://vitacapital-landing

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - run: gcloud storage rsync ./ ${{ env.BUCKET }} --recursive --delete-orphaned --exclude=".git*" --exclude=".github*"
