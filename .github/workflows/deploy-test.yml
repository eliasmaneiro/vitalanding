name: Deploy to Test

on:
  push:
    branches: [test]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to test.vitacapital.app
        uses: easingthemes/ssh-deploy@main
        with:
          SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_KEY }}
          REMOTE_HOST: ${{ secrets.DEPLOY_HOST }}
          REMOTE_USER: eliasmaneiro
          SOURCE: ./
          TARGET: /var/www/test.vitacapital.app
          ARGS: -rlgoDzvc -i --delete
          EXCLUDE: ".git/, .github/"
